# Render.com blueprint — deploys the bot on the FREE plan.
# 1. Push this repo to GitHub.
# 2. Render → New → Blueprint → pick the repo. It reads this file.
# 3. Add your secret env vars in the dashboard (see .env.example).
#
# NOTE: Render's `cron` service type is NOT free, so the daily reminder is run
# instead by hitting the web app's /cron/reminders?key=CRON_SECRET endpoint from
# a FREE external scheduler (e.g. cron-job.org or a GitHub Actions schedule).
#
# Shared Postgres so the web service and any reminder run see the same farmers.
databases:
  - name: farmer-db
    plan: free

services:
  - type: web
    name: farmer-whatsapp-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.4"
      # Shared database connection — wired in automatically, no dashboard step.
      - key: DATABASE_URL
        fromDatabase:
          name: farmer-db
          property: connectionString
      # Set these as secrets in the Render dashboard (do NOT commit real values):
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        sync: false
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      # Secret that protects the /cron/reminders endpoint. Set any random string
      # in the dashboard, then use the same value in your external scheduler URL.
      - key: CRON_SECRET
        sync: false
